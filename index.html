<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>TawasulNet</title>
    <script src="features.js"></script>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

    <!-- الهيكل الكامل للكود كما أرسلته أنت -->
    <div id="dist-tickets-list"></div>
    <div id="admin-total-dists"></div>
    <div id="admin-total-available-tickets"></div>
    <select id="admin-charge-dist-select"></select>
    <div id="admin-dists-list"></div>
    <div id="admin-packages-injection-container"></div>
    <input type="number" id="admin-charge-amount">
    <input type="text" id="new-pkg-name">
    <input type="text" id="new-pkg-price">

    <script>
        // دالة تحديث الواجهة (الجزء الثاني الذي أرسلته)
        function updateUI() {
            const distTicketsContainer = document.getElementById('dist-tickets-list');
            distTicketsContainer.innerHTML = '';
            
            [...soldTickets, ...remainingTickets].forEach(t => {
                const pkg = packages.find(p => p.id === t.packageId) || { name: 'غير معروف' };
                const isSold = t.distributorSaleStatus === 'تم البيع';
                
                distTicketsContainer.innerHTML += `
                    <div class="card" style="border-right: 5px solid ${isSold ? 'var(--success)' : 'var(--warning)'};">
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <div>
                                <div style="font-weight:bold; font-size:1.1rem;">${pkg.name}</div>
                                <div style="font-family:monospace; font-size:1.2rem; color:var(--primary); margin:5px 0;">${t.code}</div>
                            </div>
                            ${isSold ? 
                                `<button class="btn btn-danger" onclick="deleteSoldTicketByDistributor('${t.id}', '${t.code}', ${t.saleTimestamp})">حذف الكرت 🗑️</button>` 
                                : `<button class="btn btn-success" onclick="markTicketAsSold('${t.id}')">تم البيع للزبون ✅</button>`
                            }
                        </div>
                    </div>
                `;
            });

            // لوحة الإدارة
            if (userRole === 'admin') {
                document.getElementById('admin-total-dists').innerText = distributors.length;
                document.getElementById('admin-total-available-tickets').innerText = tickets.filter(t => t.status === 'متوفر').length;

                const distSelect = document.getElementById('admin-charge-dist-select');
                distSelect.innerHTML = '<option value="">اختر موزعاً...</option>';
                distributors.forEach(d => {
                    distSelect.innerHTML += `<option value="${d.id}">${d.name} (${d.balance} ريال)</option>`;
                });
            }
        }

        // دالة حقن الكروت (الجزء الثالث الذي أرسلته)
        function injectTickets(packageId) {
            const textarea = document.getElementById(`injection-area-${packageId}`);
            const lines = textarea.value.split('\n');
            let count = 0;
            let updates = {};

            lines.forEach(line => {
                const code = line.trim();
                if (code.length > 5) {
                    const newTicketRef = database.ref('tickets').push();
                    updates[newTicketRef.key] = {
                        code: code,
                        packageId: packageId,
                        status: 'متوفر',
                        createdAt: firebase.database.ServerValue.TIMESTAMP
                    };
                    count++;
                }
            });

            if (count > 0) {
                database.ref().update(updates)
                    .then(() => {
                        showToast(`تم حقن ${count} كرت بنجاح!`);
                        textarea.value = '';
                    })
                    .catch(err => showToast("خطأ: " + err.message));
            }
        }

        // تحديث الحاوية
        database.ref('packages').on('value', snapshot => {
            const container = document.getElementById('admin-packages-injection-container');
            if (container) {
                container.innerHTML = '';
                snapshot.forEach(child => {
                    const p = child.val();
                    container.innerHTML += `
                        <div class="card">
                            <label><strong>${p.name}</strong></label>
                            <textarea id="injection-area-${child.key}" class="form-control" rows="3"></textarea>
                            <button onclick="injectTickets('${child.key}')">حقن ${p.name}</button>
                        </div>
                    `;
                });
            }
        });

        // باقي الدوال (كما وردت في أجزائك)
        function markTicketAsSold(ticketId) {
            database.ref(`/tickets/${ticketId}`).update({
                distributorSaleStatus: 'تم البيع',
                saleTimestamp: firebase.database.ServerValue.TIMESTAMP
            }).then(() => showToast("تم تسجيل البيع!"));
        }

        function chargeDistributorBalance() {
            const distId = document.getElementById('admin-charge-dist-select').value;
            const amount = parseInt(document.getElementById('admin-charge-amount').value);
            const dist = distributors.find(d => d.id === distId);
            database.ref(`/distributors/${distId}`).update({
                balance: (dist.balance || 0) + amount
            }).then(() => showToast("تم شحن الرصيد!"));
        }

        function addNewPackage() {
            const name = document.getElementById('new-pkg-name').value.trim();
            const price = document.getElementById('new-pkg-price').value.trim();
            database.ref('packages').push({ name, price })
                .then(() => showToast("تمت الإضافة!"));
        }
    </script>
</body>
</html>
